version: '3.8'

services:
  app:
    build: . 
    container_name: php_sandbox
    restart: always
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=root
      - WORDPRESS_DB_PASSWORD=root
      - WORDPRESS_DB_NAME=sandbox_db
    networks:
      - sandbox_net

  db:
    image: mysql:8.0
    container_name: mysql_sandbox
    restart: always
    environment:
      MYSQL_DATABASE: sandbox_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sandbox_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_sandbox
    restart: always
    ports:
      - "8081:80" 
    environment:
      - PMA_HOST=db 
      - MYSQL_ROOT_PASSWORD=root
      - UPLOAD_LIMIT=64M 
    networks:
      - sandbox_net

networks:
  sandbox_net:
    driver: bridge

volumes:
  db_data: